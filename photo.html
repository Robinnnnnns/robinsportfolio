<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Photography</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="icon" href="./assets/photoui.png" type="image/x-icon">
    <script src="script.js" defer></script>
    <meta name="color-scheme" content="light">

</head>
<body>
    <div id="nav-placeholder"></div>
    <div id="nav-sidebar"></div>


<section class="photography-section">
    <header class="project-header" >
        <h1><span class="highlight" href="">Bird</span> Photography</h1>
        <p class="intro-text"><i>Life of an amateur bird photographer. </i><a href="https://www.instagram.com/robinnnnnns?igsh=MXVrNWw5ejJybGNpZQ%3D%3D&utm_source=qr" style="color: var(--text-main);">→</a></p>
    </header>

    <div class="hero-photos-grid">
        <div class="photo-frame-large label-top-left" style="--delay: 0.1s;">
            <div class="frame-label">POSTER 01</div>
            <img src="https://pub-a85038fa745c4d8195746e99bc07b941.r2.dev/poster1.png" alt="POSTER 1">
        </div>
        <div class="photo-frame-large label-top-right" style="--delay: 0.2s;">
            <div class="frame-label">POSTER 02</div>
            <img src="https://pub-a85038fa745c4d8195746e99bc07b941.r2.dev/poster2.png" alt="POSTER 2">
        </div>
    </div>



    <div class="photo-scroll-wrapper">
        <div class="photo-grid-horizontal">
            <div class="thumb-card" style="--delay: 0.3s;">
                <div class="thumb-frame"><div class="placeholder-img"><img src="https://pub-a85038fa745c4d8195746e99bc07b941.r2.dev/photo11.jpeg"></div></div>
                <span class="thumb-caption">Blue Tit</span>
            </div>
            <div class="thumb-card" style="--delay: 0.35s;">
                <div class="thumb-frame"><div class="placeholder-img color-orange"><img src="https://pub-a85038fa745c4d8195746e99bc07b941.r2.dev/photo10.jpeg"></div></div>
                <span class="thumb-caption">Juvenile Currawong</span>
            </div>
            <div class="thumb-card" style="--delay: 0.4s;">
                <div class="thumb-frame"><div class="placeholder-img color-lemon"><img src="https://pub-a85038fa745c4d8195746e99bc07b941.r2.dev/photo9.jpeg"></div></div>
                <span class="thumb-caption">European Robin</span>
            </div>
            <div class="thumb-card" style="--delay: 0.45s;">
                <div class="thumb-frame"><div class="placeholder-img"><img src="https://pub-a85038fa745c4d8195746e99bc07b941.r2.dev/photo4.jpeg"></div></div>
                <span class="thumb-caption">White-throated Kingfisher</span>
            </div>
            <div class="thumb-card" style="--delay: 0.5s;">
                <div class="thumb-frame"><div class="placeholder-img color-mint"><img src="https://pub-a85038fa745c4d8195746e99bc07b941.r2.dev/photo5.jpeg"></div></div>
                <span class="thumb-caption">Red-whiskered BulBul</span>
            </div>
            <div class="thumb-card" style="--delay: 0.55s;">
                <div class="thumb-frame"><div class="placeholder-img color-lemon"><img src="https://pub-a85038fa745c4d8195746e99bc07b941.r2.dev/photo6.jpeg"></div></div>
                <span class="thumb-caption">Pied Kingfisher</span>
            </div>
            <div class="thumb-card" style="--delay: 0.6s;">
                <div class="thumb-frame"><div class="placeholder-img"><img src="https://pub-a85038fa745c4d8195746e99bc07b941.r2.dev/photo3.jpeg"></div></div>
                <span class="thumb-caption">Common Hoopoe</span>
            </div>
            <div class="thumb-card" style="--delay: 0.65s;">
                <div class="thumb-frame"><div class="placeholder-img color-orange"><img src="https://pub-a85038fa745c4d8195746e99bc07b941.r2.dev/photo1.jpeg"></div></div>
                <span class="thumb-caption">Chinese Blackbird</span>
            </div>
            <div class="thumb-card" style="--delay: 0.7s;">
                <div class="thumb-frame"><div class="placeholder-img color-mint"><img src="https://pub-a85038fa745c4d8195746e99bc07b941.r2.dev/photo2.jpeg"></div></div>
                <span class="thumb-caption">Light-vented Bulbul</span>
            </div>
            <div class="thumb-card" style="--delay: 0.75s;">
                <div class="thumb-frame"><div class="placeholder-img"><img src="https://pub-a85038fa745c4d8195746e99bc07b941.r2.dev/photo7.jpeg"></div></div>
                <span class="thumb-caption">Pied Avocet</span>
            </div>
        </div>
    </div>

</section>

<footer class="footer">
    <span>© Xinru(Robin) Shi</span>
        <img src="./assets/robin1.png" alt="icon" class="footer-icon">
    <span>and Pink Robin Studio</span>
        <img src="./assets/pinkrobin.png" alt="icon" class="footer-icon">
</footer>



<script src="nav.js"></script>
</body>

<script>
    fetch('nav-other.html')
  .then(res => res.text())
  .then(data => {
    document.getElementById('nav-sidebar').innerHTML = data;
  });
</script>
