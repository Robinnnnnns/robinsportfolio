<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Directory</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="icon" href="./assets/meui.png" type="image/x-icon">
    <script src="script.js" defer></script>

</head>

<body>
<section class="directory-section">
    <h1 class="directory-title">Works Index</h1>
    
    <div class="card-container">
        <div class="dir-card about-card" style="--delay: 0.1s; --theme-color: var(--accent-orange);">
            <div class="card-tab">BIO</div>
            <div class="card-badge">01</div>
            <div class="card-content">
                <div class="card-logo"><img src="assets/me-icon.png"></div>
                <h3 class="card-name">About Me</h3>
                <ul class="project-list">
                    <li><a href="#bio">Personal Bio</a></li>
                    <li><a href="#resume">Resume</a></li>
                </ul>
            </div>
        </div>

        <div class="dir-card game-card" style="--delay: 0.2s; --theme-color: #a8d8ea;">
            <div class="card-tab">GAME</div>
            <div class="card-badge">02</div>
            <div class="card-content">
                <div class="card-logo"><img src="assets/game-icon.png"></div>
                <h3 class="card-name">Game Design</h3>
                <ul class="project-list">
                    <li><a href="#game1">Mythos Adventure</a></li>
                    <li><a href="#game2">Psyche Maze</a></li>
                </ul>
            </div>
        </div>

        <div class="dir-card ux-card" style="--delay: 0.3s; --theme-color: var(--bg-mint);">
            <div class="card-tab">UXUI</div>
            <div class="card-badge">03</div>
            <div class="card-content">
                <div class="card-logo"><img src="assets/ux-icon.png"></div>
                <h3 class="card-name">UX Design</h3>
                <ul class="project-list">
                    <li><a href="#ux1">Portfolio Web</a></li>
                    <li><a href="#ux2">Music App</a></li>
                </ul>
            </div>
        </div>

        <div class="dir-card other-card" style="--delay: 0.4s; --theme-color: var(--accent-lemon);">
            <div class="card-tab">ETC</div>
            <div class="card-badge">04</div>
            <div class="card-content">
                <div class="card-logo"><img src="assets/mix-icon.png"></div>
                <h3 class="card-name">Others</h3>
                <ul class="project-list">
                    <li><a href="#illu">Illustrations</a></li>
                    <li><a href="#audio">Audio Works</a></li>
                </ul>
            </div>
        </div>
    </div>
</section>
</body>
